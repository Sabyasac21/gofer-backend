services:
  # ─────────────────────────────────────────
  # DATABASE LAYER
  # ─────────────────────────────────────────

  postgres:
    image: postgres:14-alpine
    container_name: taskr-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-taskr_db}
      POSTGRES_USER: ${DB_USER:-taskr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskr_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskr-network

  redis:
    image: redis:7-alpine
    container_name: taskr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskr-network

  rabbitmq:
    image: rabbitmq:3.11-management-alpine
    container_name: taskr-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskr-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: taskr-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskr-network

  mongodb:
    image: mongo:6.0
    container_name: taskr-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskr-network

  # ─────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────

  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    container_name: taskr-auth
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-taskr_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-taskr_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-me}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/auth-service/src:/app/src
    networks:
      - taskr-network

  task-service:
    build:
      context: .
      dockerfile: ./services/task-service/Dockerfile
    container_name: taskr-task
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      DATABASE_URL: postgresql://${DB_USER:-taskr_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-taskr_db}
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/task-service/src:/app/src
    networks:
      - taskr-network

  worker-service:
    build:
      context: .
      dockerfile: ./services/worker-service/Dockerfile
    container_name: taskr-worker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DATABASE_URL: postgresql://${DB_USER:-taskr_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-taskr_db}
      REDIS_URL: redis://redis:6379
      WORKER_ADMIN_KEY: ${WORKER_ADMIN_KEY:-change-me-worker-admin-key}
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/worker-service/src:/app/src
      - ./storage/worker-documents:/app/storage/worker-documents
    networks:
      - taskr-network

  matching-service:
    build:
      context: .
      dockerfile: ./services/matching-service/Dockerfile
    container_name: taskr-matching
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DB_USER:-taskr_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-taskr_db}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3004:3004"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/matching-service/src:/app/src
    networks:
      - taskr-network

  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    container_name: taskr-payment
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      DATABASE_URL: postgresql://${DB_USER:-taskr_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-taskr_db}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/payment-service/src:/app/src
    networks:
      - taskr-network

  notification-service:
    build:
      context: .
      dockerfile: ./services/notification-service/Dockerfile
    container_name: taskr-notification
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      FCM_SERVICE_ACCOUNT_KEY: ${FCM_SERVICE_ACCOUNT_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3006:3006"
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/notification-service/src:/app/src
    networks:
      - taskr-network

  analytics-service:
    build:
      context: .
      dockerfile: ./services/analytics-service/Dockerfile
    container_name: taskr-analytics
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3007
      MONGO_URL: mongodb://admin:${MONGO_PASSWORD:-admin}@mongodb:27017/taskr_analytics
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    ports:
      - "3007:3007"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./services/analytics-service/src:/app/src
    networks:
      - taskr-network

  location-service:
    build:
      context: .
      dockerfile: ./services/location-service/Dockerfile
    container_name: taskr-location
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3008
      REDIS_URL: redis://redis:6379
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    ports:
      - "3008:3008"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/location-service/src:/app/src
    networks:
      - taskr-network

  websocket-server:
    build:
      context: .
      dockerfile: ./services/websocket-server/Dockerfile
    container_name: taskr-websocket
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3009
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-me}
    ports:
      - "3009:3009"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./services/websocket-server/src:/app/src
    networks:
      - taskr-network

  admin-api:
    build:
      context: .
      dockerfile: ./services/admin-api/Dockerfile
    container_name: taskr-admin-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3010
      DATABASE_URL: postgresql://${DB_USER:-taskr_user}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-taskr_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-me}
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/admin-api/src:/app/src
    networks:
      - taskr-network

  # ─────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: taskr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - auth-service
      - task-service
      - websocket-server
    networks:
      - taskr-network

  # ─────────────────────────────────────────
  # MONITORING
  # ─────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: taskr-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - taskr-network

  grafana:
    image: grafana/grafana:latest
    container_name: taskr-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - taskr-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  taskr-network:
    driver: bridge
